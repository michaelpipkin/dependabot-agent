name: publish

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # uses the version from packageManager

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # The publish step below uses `npm publish` for OIDC Trusted Publishing,
      # which needs npm >= 11.5.1 — newer than what the runner ships.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Decide whether to publish. Skips if the commit says [no-deploy],
      # or if this exact version is already on npm (e.g. a docs-only push).
      - name: Check publish conditions
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[no-deploy]"* ]]; then
            echo "reason=commit message contains [no-deploy]"  >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "reason=$NAME@$VERSION is already published" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "reason=publishing $NAME@$VERSION" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Publish with npm (not pnpm) so OIDC Trusted Publishing handles auth.
      # npm publish only packs the `files` in package.json; it needs no lockfile.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public

      - name: Skipped
        if: steps.check.outputs.publish != 'true'
        run: echo "Skipped publish — ${{ steps.check.outputs.reason }}"
