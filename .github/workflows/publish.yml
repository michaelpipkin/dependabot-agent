name: publish

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance
  contents: write # required to create the git tag + GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6 # uses the version from packageManager

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # The publish step below uses `npm publish` for OIDC Trusted Publishing,
      # which needs npm >= 11.5.1 — newer than what the runner ships.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs on every push to main, not just publishing ones, so a red suite is
      # visible even on a commit that doesn't ship. `prepublishOnly` runs these
      # again at publish time — that guards local `npm publish` too.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      # Decide whether to publish. Skips if the commit says [no-deploy],
      # or if this exact version is already on npm (e.g. a docs-only push).
      - name: Check publish conditions
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[no-deploy]"* ]]; then
            echo "reason=commit message contains [no-deploy]"  >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "reason=$NAME@$VERSION is already published" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "reason=publishing $NAME@$VERSION" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Publish with npm (not pnpm) so OIDC Trusted Publishing handles auth.
      # npm publish only packs the `files` in package.json; it needs no lockfile.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public

      # npm has no release-notes surface of its own — it renders README.md and
      # nothing else. GitHub Releases is what Dependabot and Renovate read to
      # fill in the body of the PRs they open for this package, so cutting one
      # per version is what actually gets these notes in front of users.
      # Runs only after a successful publish, so npm and GitHub can't disagree.
      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Extract this version's section: everything between its own heading
          # and the next "## [" heading. Uses literal index() matching rather
          # than a built regex — the version contains dots, and bracket/dot
          # escaping through the shell into awk is fragile enough to silently
          # match nothing and fall through to generated notes.
          awk -v ver="$VERSION" '
            BEGIN { heading = "## [" ver "]" }
            index($0, heading) == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ -s release-notes.md ]; then
            gh release create "v$VERSION" --title "v$VERSION" --notes-file release-notes.md
          else
            echo "::warning::No CHANGELOG.md section found for $VERSION — using generated notes."
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          fi

      - name: Skipped
        if: steps.check.outputs.publish != 'true'
        run: echo "Skipped publish — ${{ steps.check.outputs.reason }}"
